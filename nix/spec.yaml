schemaVersion: "1"
kind: mixin
name: nix
displayName: Nix package manager
description: Installs Nix in single-user mode. Base for layered Nix kits.

network:
  allowedDomains:
    - ports.ubuntu.com         # install: apt-get update (required for xz-utils)
    - download.docker.com      # install: apt-get sources (required for xz-utils)
    - nixos.org                # install: Nix installer script
    - releases.nixos.org       # install: Nix release tarballs
    - channels.nixos.org       # runtime: nixpkgs channel updates
    - cache.nixos.org          # runtime: binary cache for pre-built packages
environment:
  variables:
    USER: agent

commands:
  install:
    - command: "apt-get update && apt-get install -y xz-utils"
      description: Install xz-utils (required by the Nix installer to unpack its tarball)
    - command: "USER=agent HOME=/home/agent curl --proto '=https' --tlsv1.2 -L https://nixos.org/nix/install | sh -s -- --no-daemon"
      user: "1000"
      description: Install Nix in single-user mode
    - command: "echo '. /home/agent/.nix-profile/etc/profile.d/nix.sh' >> /etc/sandbox-persistent.sh"
      description: Persist nix PATH activation so all shell sessions (including non-interactive) pick it up

memory: |
  ## Nix

  Nix is installed in single-user mode. Use it to run tools without installing
  them permanently.

  - Run a command with a package: `nix-shell -p <package> --run <command>`
  - Do not use `nix-shell` without `--run` — it opens an interactive subshell
    and will hang in a non-interactive context
  - No daemon — single-user profile under /home/agent/.nix-profile
